<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="3つの質問に答えるだけで、あなたにぴったりの旅のテーマと360°観光映像が見つかります。">
  <title>旅の目的診断 | anywhere café OSAKA</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

  <!-- ===== トップ画面 S01 ===== -->
  <main id="screen-top" class="app" aria-label="トップ画面">
    <img class="brand-logo" src="assets/logo.svg" alt="anywhere café OSAKA">

    <div class="top-hero" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
      <img class="top-icon" src="assets/ac-logo.png" alt="anywhere café OSAKA">
      <h1 class="top-title">旅の目的診断</h1>
      <p class="top-subtitle">
        3つの質問に答えるだけで、<br>
        あなたにぴったりの旅のテーマと<br>
        360°観光映像が見つかります。
      </p>
      <button id="start-btn" class="answer-btn btn-yes" style="width:100%;max-width:280px;font-size:16px;" aria-label="診断をはじめる">
        診断をはじめる
      </button>
      <p class="top-note">※ 所要時間 30秒程度</p>
    </div>

    <p class="brand-logo-text">anywhere café OSAKA</p>
  </main>

  <!-- ===== 質問画面 S02〜S04 ===== -->
  <main id="screen-question" class="app" hidden aria-label="質問画面">
    <img class="brand-logo" src="assets/logo.svg" alt="anywhere café OSAKA">

    <div class="question-header">
      <div class="progress-dots" aria-hidden="true">
        <span class="progress-dot active"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
      </div>
      <span class="progress-label" id="progress-text" aria-live="polite">1 / 3</span>
    </div>

    <div class="question-card" role="region" aria-label="質問">
      <p class="question-text fade-in" id="question-text"></p>
    </div>

    <div class="answer-buttons">
      <button class="answer-btn btn-yes" onclick="answer('yes')" aria-label="YES">YES</button>
      <button class="answer-btn btn-no" onclick="answer('no')" aria-label="NO">NO</button>
    </div>
  </main>

  <!-- ===== 結果画面 S05 ===== -->
  <main id="screen-result" class="app" hidden aria-label="診断結果画面">
    <img class="brand-logo" src="assets/logo.svg" alt="anywhere café OSAKA">

    <p class="result-label">あなたにおすすめの観光地はこちら</p>
    <h1 class="result-category" id="result-category"></h1>

    <a id="destination-card" class="destination-card" href="#" target="_blank" rel="noopener noreferrer" aria-label="観光地カード（タップで360°映像を開く）">
      <img id="result-img" src="" alt="">
      <div class="card-body">
        <p class="result-prefecture" id="result-prefecture"></p>
        <h2 class="result-spot" id="result-spot"></h2>
        <p class="card-tap-hint">👆 タップして映像を見る</p>
      </div>
    </a>

    <a id="video-btn" class="primary-button" href="#" target="_blank" rel="noopener noreferrer">
      <span class="play-icon" aria-hidden="true">▶</span>
      360°映像を見る
    </a>

    <button id="retry-btn" class="retry-button">もう一度診断する</button>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>ｎ
